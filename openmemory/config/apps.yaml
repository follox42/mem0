# Apps = macro memory zones per user.
#
# Le decoupage fin (sub-domaines) ne vit PAS ici. Il vit dans :
#   - `categories` (config/categories.yaml) : taxonomie semantique auto-classifiee
#   - `metadata.tags` : tags transverses libres
#   - graph (Neo4j) : entites + relations auto-extraites
#
# Les apps sont des frontieres STRUCTURELLES (ACL, isolation logique).
# Voir TAXONOMY.md pour le modele 5-niveaux complet.
#
# `shared_default: true` => readable by all agents of that user by default.
#
# Agents are NOT pre-defined here. They are spawned at runtime via MCP URL.
# At first request, OpenMemory creates the agent's app on-the-fly with
# default ACL (read access to apps marked shared_default: true).

apps:
  nolann:
    - name: perso
      description: Vie privee (sante, famille, finances perso, journal, decisions de vie). Niveau d'intimite eleve.

    - name: business
      description: Toutes les entreprises et missions remunerees (NoCode18, Zephly, Freelance Malt, Upwork) + sales/marketing/copywriting transverse.

    - name: tools
      description: Infra technique que je construis ou opere (OpenFang, OpenClaw, OpenMemory, Social OS, MCPs, web stealth, trading bot, Coolify, Cloudflare). Mes systemes.

    - name: learn
      description: Connaissances acquises (knowledge/ Obsidian, BTS CIEL, lectures code, OAuth deep-dive, kernel, theorie trading). Transverse par nature.
      shared_default: true

    - name: shared
      description: Identite, profils sociaux, prefs globales, infos communes (lue par tous mes agents).
      shared_default: true

    - name: inbox
      description: Capture brute pas-encore-classifiee. A trier periodiquement (procedure proc-tri-inbox).

  jess:
    - name: personal
      description: Memoire perso de Jess

  yoann:
    - name: personal
      description: Memoire perso de Yoann

  matt:
    - name: personal
      description: Memoire perso de Matt

  djamila:
    - name: personal
      description: Memoire perso de Djamila
