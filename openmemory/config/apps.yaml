# Apps = memory zones per user (= projects / contexts).
#
# `shared_default: true` => readable by all agents of that user by default.
#   Use this for cross-context info (identity, social profiles, generic knowledge).
#
# Naming convention (life axis prefix):
#   priv-*   = vie privee stricte (sante, finances perso, relations)
#   pro-*    = business / clients / contrats
#   tools-*  = systemes que tu construis ou operes
#   learn-*  = connaissances apprises (transverse par nature)
#   shared   = identite + infos communes
#   inbox    = capture brute pas-encore-classifiee
#
# Agents are NOT pre-defined here. They are spawned at runtime via MCP URL.
# At first request, OpenMemory creates the agent's app on-the-fly with
# default ACL (read access to apps marked shared_default: true).

apps:
  nolann:
    # === AXE VIE PRIVEE ===
    - name: priv-perso
      description: Vie perso (sante, journal, secrets, prefs intimes)

    - name: priv-finance
      description: Comptes perso, budget, investissements (hors trading bot)

    - name: priv-relations
      description: Notes sur Jess, amis, famille (cote Nolann, pas leurs memoires a eux)

    # === AXE PRO (entreprises + missions) ===
    - name: pro-nocode18
      description: Entreprise NoCode18 (agence web locale)

    - name: pro-zephly
      description: Plateforme Zephly (workflow IA SaaS)

    - name: pro-freelance
      description: Freelance Malt (TJM 650 EUR)

    - name: pro-upwork
      description: Plateforme Upwork (farm reviews dev web)

    # === AXE OUTILS / SYSTEMES PERSO ===
    - name: tools-trading
      description: Bot trading (Hyperliquid + FTMO)

    - name: tools-content
      description: Social media + content engine (TikTok, IG, X, LI)

    - name: tools-infra
      description: Serveurs, Coolify, MCPs, OpenFang, OpenClaw

    # === AXE APPRENTISSAGE (transverse par defaut) ===
    - name: learn-tech
      description: Cours, concepts code, patterns, tech stacks
      shared_default: true

    - name: learn-business
      description: Sales, marketing, entrepreneuriat, psychologie vente
      shared_default: true

    # === AXE TRANSVERSE ===
    - name: shared
      description: Identite, profils sociaux, prefs globales (lue par tous les agents Nolann)
      shared_default: true

    - name: inbox
      description: Capture brute pas-encore-classifiee. A trier periodiquement

  jess:
    - name: personal
      description: Memoire perso de Jess

  yoann:
    - name: personal
      description: Memoire perso de Yoann

  matt:
    - name: personal
      description: Memoire perso de Matt

  djamila:
    - name: personal
      description: Memoire perso de Djamila
