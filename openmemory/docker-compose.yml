# OpenMemory Multi-User Stack
# - postgres : metadata (users, apps, ACL, history)
# - qdrant   : vector store (semantic search)
# - neo4j    : graph memory (entities + relations) + browser UI :7474
# - openmemory-mcp : API + MCP server (port 8765)
# - openmemory-ui  : Next.js dashboard (port 3000)
#
# Multi-user : USER env var vide => users crees a la volee depuis le path MCP.
# Seed : scripts/seed.py s'execute au boot et lit config/*.yaml (idempotent).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: openmemory
      POSTGRES_USER: openmemory
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openmemory -d openmemory"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.4
    expose:
      - "6333"
    volumes:
      - qdrant_data:/qdrant/storage
    # Qdrant image is distroless (no shell, no wget, no curl).
    # Skip healthcheck and rely on restart policy + dependent service retry.
    restart: unless-stopped

  neo4j:
    image: neo4j:5.24-community
    environment:
      # Coolify does NOT substitute nested ${VAR} inside composite strings
      # (e.g. 'neo4j/${NEO4J_PASSWORD}') — see deployment failure logs.
      # Workaround: pass the full auth string via NEO4J_AUTH env var directly.
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/changeme}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      # The Neo4j entrypoint converts NEO4J_<x> env vars into config settings
      # `<x>` and rejects unknown ones. So we MUST NOT use `NEO4J_PASSWORD`
      # inside this container. Use a non-prefixed var for the healthcheck.
      HC_NEO4J_PASSWORD: ${OPENMEMORY_NEO4J_PASSWORD:-changeme}
    expose:
      - "7474"
      - "7687"
    # Traefik labels — Coolify auto-detects only single-port services.
    # Neo4j has 2 ports (7474 browser + 7687 bolt) so we route browser
    # explicitly. Bolt stays internal (only the openmemory-mcp container
    # talks to it via the docker network).
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openmemory-neo4j.rule=Host(`neo4j.nocode18.com`)"
      - "traefik.http.routers.openmemory-neo4j.entrypoints=http"
      - "traefik.http.services.openmemory-neo4j.loadbalancer.server.port=7474"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      # cypher-shell ships with the official neo4j image, unlike wget.
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"$${HC_NEO4J_PASSWORD:-changeme}\" 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  openmemory-mcp:
    # No `image:` here: that would make Compose pull the upstream
    # mem0/openmemory-mcp image (which lacks our config/scripts) and
    # ignore the local Dockerfile. We want the local build to win.
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      - DATABASE_URL=postgresql://openmemory:${POSTGRES_PASSWORD:-changeme}@postgres:5432/openmemory
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${OPENMEMORY_NEO4J_PASSWORD:-changeme}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SEED_ON_BOOT=${SEED_ON_BOOT:-true}
      - USER=${USER:-}
      - API_KEY=${API_KEY:-}
    env_file:
      - api/.env
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        # Qdrant has no shell-based healthcheck possible (distroless image).
        # Service starts fast; mem0 client will retry on connection error.
        condition: service_started
    expose:
      - "8765"
    # config/ and scripts/ are baked into the image now (see api/Dockerfile).
    # No volume mount needed — Coolify was remapping ./X paths in a way that
    # broke this approach. Keeping them inside the image is also more portable.
    command: >
      sh -c "
        if [ \"$$SEED_ON_BOOT\" = \"true\" ]; then
          python /usr/src/openmemory/scripts/seed.py || echo '[seed] failed but continuing';
        fi &&
        uvicorn main:app --host 0.0.0.0 --port 8765 --workers 4
      "
    restart: unless-stopped

  openmemory-ui:
    build:
      context: ui/
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_USER_ID: ${USER:-nolann}
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_USER_ID=${USER:-nolann}
    depends_on:
      - openmemory-mcp
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
