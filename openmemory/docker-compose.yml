# OpenMemory Multi-User Stack
# - postgres : metadata (users, apps, ACL, history)
# - qdrant   : vector store (semantic search)
# - neo4j    : graph memory (entities + relations) + browser UI :7474
# - openmemory-mcp : API + MCP server (port 8765)
# - openmemory-ui  : Next.js dashboard (port 3000)
#
# Multi-user : USER env var vide => users crees a la volee depuis le path MCP.
# Seed : scripts/seed.py s'execute au boot et lit config/*.yaml (idempotent).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: openmemory
      POSTGRES_USER: openmemory
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openmemory -d openmemory"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.4
    expose:
      - "6333"
    volumes:
      - qdrant_data:/qdrant/storage
    # Qdrant image is distroless (no shell, no wget, no curl).
    # Skip healthcheck and rely on restart policy + dependent service retry.
    restart: unless-stopped

  # Neo4j was removed 2026-05-17 — mem0 v2.x dropped graph_store support,
  # so the container was idle. Retrieval relies entirely on Qdrant + BM25
  # hybrid search + (optional) reranker. If you need a graph layer back,
  # see GraphMemory plugins outside the mem0 main lib.

  openmemory-mcp:
    # No `image:` here: that would make Compose pull the upstream
    # mem0/openmemory-mcp image (which lacks our config/scripts) and
    # ignore the local Dockerfile. We want the local build to win.
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      - DATABASE_URL=postgresql://openmemory:${POSTGRES_PASSWORD:-changeme}@postgres:5432/openmemory
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SEED_ON_BOOT=${SEED_ON_BOOT:-true}
      - USER=${USER:-}
      - API_KEY=${API_KEY:-}
    env_file:
      - api/.env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        # Qdrant has no shell-based healthcheck possible (distroless image).
        # Service starts fast; mem0 client will retry on connection error.
        condition: service_started
    expose:
      - "8765"
    # config/ and scripts/ are baked into the image now (see api/Dockerfile).
    # No volume mount needed — Coolify was remapping ./X paths in a way that
    # broke this approach. Keeping them inside the image is also more portable.
    command: >
      sh -c "
        if [ \"$$SEED_ON_BOOT\" = \"true\" ]; then
          python /usr/src/openmemory/scripts/seed.py || echo '[seed] failed but continuing';
        fi &&
        uvicorn main:app --host 0.0.0.0 --port 8765 --workers 4 --proxy-headers --forwarded-allow-ips='*'
      "
    restart: unless-stopped

  openmemory-ui:
    build:
      context: ui/
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_USER_ID: ${USER:-nolann}
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_USER_ID=${USER:-nolann}
    depends_on:
      - openmemory-mcp
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  # neo4j_data, neo4j_logs removed with the neo4j service (2026-05-17).
  # Coolify keeps the underlying named volumes around — drop them manually
  # via "docker volume rm" if you want to reclaim the disk.
